name: Backend CI and Render Deploy

on:
  pull_request:
    paths:
      - backend/**
      - render.yaml
      - .github/workflows/backend-ci-render.yml
  push:
    branches:
      - main
      - master
    paths:
      - backend/**
      - render.yaml
      - .github/workflows/backend-ci-render.yml
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: dummy-anon-key
      SUPABASE_SERVICE_KEY: dummy-service-key
      GROQ_API_KEY: dummy-groq-key
      FRONTEND_URL: http://localhost:8080
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m py_compile main.py

      - name: Run tests
        run: pytest tests -q

  deploy-render:
    name: Deploy Backend to Render
    needs: backend-ci
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      secrets.RENDER_BACKEND_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy hook..."
          curl --fail --silent --show-error -X POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."